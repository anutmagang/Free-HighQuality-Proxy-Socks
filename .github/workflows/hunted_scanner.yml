name: Hunted Proxy System (Elite Scanner)

on:
  workflow_run:
    workflows: ["Proxy Auto System (Main Scraper)"] # Pastikan nama ini SAMA PERSIS dengan 'name' di main_scraper.yml
    types:
      - completed
  workflow_dispatch: # Memungkinkan kamu klik "Run workflow" secara manual

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Menghilangkan warning Node.js 20

jobs:
  hunt:
    runs-on: ubuntu-latest
    # Syarat: Hanya jalan jika workflow Scraper Utama statusnya BERHASIL
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Hunter Engine (Scanning)
        run: python scanner.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit & Push Hunted Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Menambahkan folder hunted secara spesifik
          git add results/hunted/
          # Commit jika ada perubahan, jika tidak ada maka lanjut (exit 0)
          git commit -m "Hunted Elite Update: $(date '+%Y-%m-%d %H:%M')" || exit 0
          # Rebase untuk menghindari konflik saat push
          git pull origin main --rebase
          git push origin main
